<svg width="680" height="200" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Tolga Bayrak terminal header</title>
  <desc>Animated green-on-black terminal header for GitHub README</desc>
  <style>
    .mono { font-family: 'Courier New', Courier, monospace; }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .cursor { animation: blink 1s step-end infinite; }
    @keyframes fadein { from{opacity:0} to{opacity:1} }
    .l1{animation:fadein 0.3s 0.1s both}
    .l2{animation:fadein 0.3s 0.4s both}
    .l3{animation:fadein 0.3s 0.7s both}
    .l4{animation:fadein 0.3s 1.0s both}
    .l5{animation:fadein 0.3s 1.3s both}
    .l6{animation:fadein 0.3s 1.6s both}
    .l7{animation:fadein 0.3s 1.9s both}
  </style>

  <rect width="680" height="200" rx="10" fill="#0a0f0a"/>
  <rect width="680" height="32" rx="0" fill="#111a11"/>
  <rect width="680" height="32" rx="10" fill="#111a11"/>
  <rect x="0" y="22" width="680" height="10" fill="#111a11"/>
  <circle cx="18" cy="16" r="5.5" fill="#ff5f57"/>
  <circle cx="36" cy="16" r="5.5" fill="#febc2e"/>
  <circle cx="54" cy="16" r="5.5" fill="#28c840"/>
  <text x="340" y="21" text-anchor="middle" fill="#3a6a3a" font-size="12" class="mono">bash — tolga@dev: ~</text>

  <text x="40" y="62" fill="#3a6a3a" font-size="13" class="mono l1">┌──(</text>
  <text x="81" y="62" fill="#00ff46" font-size="13" class="mono l1">tolga</text>
  <text x="120" y="62" fill="#3a6a3a" font-size="13" class="mono l1">㉿</text>
  <text x="138" y="62" fill="#00cc33" font-size="13" class="mono l1">dev</text>
  <text x="162" y="62" fill="#3a6a3a" font-size="13" class="mono l1">)-[~]</text>

  <text x="40" y="82" fill="#3a6a3a" font-size="13" class="mono l2">└─</text>
  <text x="62" y="82" fill="#00ff46" font-size="13" class="mono l2">$</text>
  <text x="76" y="82" fill="#ccffcc" font-size="13" class="mono l2">whoami</text>

  <text x="40" y="108" fill="#00ff46" font-size="15" font-weight="bold" class="mono l3">TOLGA BAYRAK</text>

  <text x="40" y="128" fill="#3a8a3a" font-size="12" class="mono l4">[ Software Developer &amp; Backend Architect ]</text>

  <text x="40" y="152" fill="#3a6a3a" font-size="13" class="mono l5">┌──(</text>
  <text x="81" y="152" fill="#00ff46" font-size="13" class="mono l5">tolga</text>
  <text x="120" y="152" fill="#3a6a3a" font-size="13" class="mono l5">㉿</text>
  <text x="138" y="152" fill="#00cc33" font-size="13" class="mono l5">dev</text>
  <text x="162" y="152" fill="#3a6a3a" font-size="13" class="mono l5">)-[~]</text>

  <text x="40" y="172" fill="#3a6a3a" font-size="13" class="mono l6">└─</text>
  <text x="62" y="172" fill="#00ff46" font-size="13" class="mono l6">$</text>

  <rect x="76" y="158" width="9" height="16" fill="#00ff46" class="mono l7 cursor"/>
</svg>
