  <text x="340" y="21" text-anchor="middle" fill="#3a6a3a" class="ms">bash — tolga@dev: ~</text>

  <text x="30" y="62"  fill="#3a6a3a" class="m a01">┌──(<tspan fill="#00ff46">tolga</tspan><tspan fill="#3a6a3a">㉿</tspan><tspan fill="#00cc33">dev</tspan><tspan fill="#3a6a3a">)-[~]</tspan></text>
  <text x="30" y="80"  fill="#3a6a3a" class="m a02">└─<tspan fill="#00ff46">$</tspan><tspan fill="#ccffcc"> whoami</tspan></text>
  <text x="30" y="100" fill="#00ff46" class="mb a03">TOLGA BAYRAK</text>
  <text x="30" y="118" fill="#3a8a3a" class="ms a04">[ Fullstack Developer &amp; Backend Architect ]</text>

  <text x="30" y="138" fill="#1a3a1a" class="ms a05">────────────────────────────────────────────────────</text>

  <text x="30" y="158" fill="#3a6a3a" class="m a06">┌──(<tspan fill="#00ff46">tolga</tspan><tspan fill="#3a6a3a">㉿</tspan><tspan fill="#00cc33">dev</tspan><tspan fill="#3a6a3a">)-[~]</tspan></text>
  <text x="30" y="176" fill="#3a6a3a" class="m a07">└─<tspan fill="#00ff46">$</tspan><tspan fill="#ccffcc"> cat focus.txt</tspan></text>
  <text x="30" y="196" fill="#5aaa5a" class="ms a08">■ <tspan fill="#aaffaa">fullstack_dev</tspan>        <tspan fill="#3a6a3a">// end-to-end ownership, from db to ui</tspan></text>
  <text x="30" y="213" fill="#5aaa5a" class="ms a09">■ <tspan fill="#aaffaa">api_design</tspan>           <tspan fill="#3a6a3a">// contracts first, versioned, predictable</tspan></text>
  <text x="30" y="230" fill="#5aaa5a" class="ms a10">■ <tspan fill="#aaffaa">frontend_craft</tspan>       <tspan fill="#3a6a3a">// state, performance, a11y — not just markup</tspan></text>
  <text x="30" y="247" fill="#5aaa5a" class="ms a11">■ <tspan fill="#aaffaa">backend_architecture</tspan> <tspan fill="#3a6a3a">// layered, stateless, easy to reason about</tspan></text>
  <text x="30" y="264" fill="#5aaa5a" class="ms a12">■ <tspan fill="#aaffaa">saas_mindset</tspan>         <tspan fill="#3a6a3a">// build for scale, design for change</tspan></text>

  <text x="30" y="284" fill="#1a3a1a" class="ms a13">────────────────────────────────────────────────────</text>

  <text x="30" y="304" fill="#3a6a3a" class="m a14">┌──(<tspan fill="#00ff46">tolga</tspan><tspan fill="#3a6a3a">㉿</tspan><tspan fill="#00cc33">dev</tspan><tspan fill="#3a6a3a">)-[~]</tspan></text>
  <text x="30" y="322" fill="#3a6a3a" class="m a15">└─<tspan fill="#00ff46">$</tspan><tspan fill="#ccffcc"> git log --oneline</tspan></text>
  <text x="30" y="342" class="ms a16"><tspan fill="#e8a838">a3f9c12</tspan><tspan fill="#ccffcc"> refactor: split monolith into clean service layers</tspan></text>
  <text x="30" y="359" class="ms a17"><tspan fill="#e8a838">b71d004</tspan><tspan fill="#ccffcc"> fix: finally understood why it worked in dev but not prod</tspan></text>
  <text x="30" y="376" class="ms a18"><tspan fill="#e8a838">c92e3a1</tspan><tspan fill="#ccffcc"> feat: api versioning done right this time</tspan></text>
  <text x="30" y="393" class="ms a19"><tspan fill="#e8a838">d44f8b7</tspan><tspan fill="#ccffcc"> perf: cut response time by 60% — bottleneck was obvious in hindsight</tspan></text>
  <text x="30" y="410" class="ms a20"><tspan fill="#e8a838">e19a2cc</tspan><tspan fill="#ccffcc"> chore: deleted more code than i wrote today (good day)</tspan></text>
  <text x="30" y="427" class="ms a21"><tspan fill="#e8a838">f0b5d39</tspan><tspan fill="#ccffcc"> feat: frontend state finally makes sense</tspan></text>
  <text x="30" y="444" class="ms a22"><tspan fill="#e8a838">071c6e8</tspan><tspan fill="#ccffcc"> docs: wrote the readme i wish existed when i started</tspan></text>
  <text x="30" y="461" class="ms a23"><tspan fill="#e8a838">182a9f5</tspan><tspan fill="#ccffcc"> init: clean slate, this time we do it properly</tspan></text>

  <text x="30" y="481" fill="#1a3a1a" class="ms a24">────────────────────────────────────────────────────</text>

  <text x="30" y="501" fill="#3a6a3a" class="m a25">┌──(<tspan fill="#00ff46">tolga</tspan><tspan fill="#3a6a3a">㉿</tspan><tspan fill="#00cc33">dev</tspan><tspan fill="#3a6a3a">)-[~]</tspan></text>
  <text x="30" y="519" fill="#3a6a3a" class="m a26">└─<tspan fill="#00ff46">$</tspan><tspan fill="#ccffcc"> cat contact.sh</tspan></text>
  <text x="30" y="539" fill="#3a7a3a" class="ms a27">#!/bin/bash</text>
  <text x="30" y="556" fill="#5aaa5a" class="ms a28">EMAIL<tspan fill="#ccffcc">=</tspan><tspan fill="#ffdd88">"bayraktolga28@gmail.com"</tspan></text>
  <text x="30" y="573" fill="#5aaa5a" class="ms a29">GITHUB<tspan fill="#ccffcc">=</tspan><tspan fill="#ffdd88">"github.com/tolgabayrak"</tspan></text>
  <text x="30" y="590" fill="#ccffcc" class="ms a30">echo <tspan fill="#ffdd88">"Open to: remote · freelance · collaboration"</tspan></text>

  <text x="30" y="610" fill="#1a3a1a" class="ms a31">────────────────────────────────────────────────────</text>

  <text x="30" y="634" fill="#3a6a3a" class="m a32">┌──(<tspan fill="#00ff46">tolga</tspan><tspan fill="#3a6a3a">㉿</tspan><tspan fill="#00cc33">dev</tspan><tspan fill="#3a6a3a">)-[~]</tspan></text>
  <text x="30" y="652" fill="#3a6a3a" class="m a33">└─<tspan fill="#00ff46">$</tspan></text>
